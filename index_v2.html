<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ホワサバ集結管理</title>
<style>
body{font-family:sans-serif;max-width:480px;margin:auto;padding:12px;background:#f5f5f5}
.card{background:#fff;padding:12px;border-radius:10px;margin-bottom:12px}
input,select,button{width:100%;padding:10px;margin-top:6px;box-sizing:border-box}
button{cursor:pointer}
.row{display:flex;gap:8px}.row>*{flex:1}
.item{border-top:1px solid #ddd;padding:8px 0}
.smallbtn{width:auto;padding:4px 8px;margin-left:8px}
</style>
</head>
<body>
<div class="card">
<h2>ホワサバ集結管理</h2>
<div id="clock"></div>
<div class="row">
<button onclick="setTZ('UTC')">UTC</button>
<button onclick="setTZ('JST')">JST</button>
</div>
</div>

<div class="card">
<label>集結先</label>
<input id="target">

<label>集結時間</label>
<select id="rallyTime">
<option value="1">1分</option>
<option value="5">5分</option>
</select>

<label>時刻種別</label>
<select id="mode">
<option value="arrival">到着時刻</option>
<option value="start">集結開始時刻</option>
</select>

<label>時刻</label>
<input id="timeInput" type="time" step="1">

<label>集結主</label>
<input id="leader" list="leaders">

<label>行軍時間(秒)</label>
<input id="march" type="number" value="45">

<button onclick="addEntry()">追加</button>
</div>

<div class="card">
<h3>集結主一覧</h3>
<datalist id="leaders"></datalist>
<div id="leaderList"></div>
</div>

<div class="card">
<h3>登録一覧</h3>
<div id="list"></div>
<button onclick="copyChat()">チャットコピー</button>
</div>

<script>
let tz='UTC';
let entries=JSON.parse(localStorage.getItem('entries')||'[]');
let leaders=JSON.parse(localStorage.getItem('leaders')||'[]');

function save(){
 localStorage.setItem('entries',JSON.stringify(entries));
 localStorage.setItem('leaders',JSON.stringify(leaders));
}

function setTZ(v){tz=v;render();}

function updateClock(){
 const n=new Date();
 document.getElementById('clock').innerHTML=
 `JST ${n.toLocaleTimeString('ja-JP',{hour12:false,timeZone:'Asia/Tokyo'})}<br>
 UTC ${n.toLocaleTimeString('ja-JP',{hour12:false,timeZone:'UTC'})}<br>
 表示基準:${tz}`;
}
setInterval(updateClock,1000); updateClock();

function fmt(ms){
 return new Date(ms).toLocaleTimeString(
 'ja-JP',
 {hour12:false,timeZone:tz==='JST'?'Asia/Tokyo':'UTC'}
 );
}

function refreshLeaders(){
 document.getElementById('leaders').innerHTML =
 leaders.map(x=>`<option value="${x}">`).join('');

 document.getElementById('leaderList').innerHTML =
 leaders.map(x=>`${x} <button class="smallbtn" onclick="deleteLeader('${x}')">削除</button><br>`).join('');
}
refreshLeaders();

function deleteLeader(name){
 leaders=leaders.filter(x=>x!==name);
 save();
 refreshLeaders();
}

function addEntry(){
 const target=document.getElementById('target').value.trim();
 const leader=document.getElementById('leader').value.trim();
 const march=parseInt(document.getElementById('march').value||0);
 const rally=parseInt(document.getElementById('rallyTime').value);
 const mode=document.getElementById('mode').value;
 const t=document.getElementById('timeInput').value;

 if(!target||!leader||!t){alert('入力してください');return;}

 if(!leaders.includes(leader)) leaders.push(leader);

 const [h,m,s]=t.split(':').map(Number);
 let d=new Date();
 d.setHours(h,m,s||0,0);

 let arrival=new Date(d);
 if(mode==='start'){
   arrival=new Date(d.getTime()+rally*60000);
 }

 const depart=new Date(arrival.getTime()-march*1000);

 entries.push({
   id:Date.now(),
   target,leader,rally,
   arrival:arrival.getTime(),
   depart:depart.getTime()
 });

 save();
 refreshLeaders();
 render();
}

function deleteEntry(id){
 entries=entries.filter(x=>x.id!==id);
 save();
 render();
}

function render(){
 entries.sort((a,b)=>a.depart-b.depart);

 document.getElementById('list').innerHTML =
 entries.map((e,i)=>`
 <div class="item">
 ${i+1}. <b>${e.leader}</b><br>
 集結先:${e.target} (${e.rally}分)<br>
 出発:${fmt(e.depart)}<br>
 到着:${fmt(e.arrival)}<br>
 <button onclick="deleteEntry(${e.id})">削除</button>
 </div>`).join('');
}
render();

function copyChat(){
 let groups={};

 entries.forEach(e=>{
   let key=e.target+'|'+e.rally;
   if(!groups[key]) groups[key]=[];
   groups[key].push(e);
 });

 let txt=`【集結出発時間(${tz})】\n\n`;

 Object.keys(groups).forEach(k=>{
   let [target,rally]=k.split('|');
   let arr=groups[k].sort((a,b)=>a.depart-b.depart);

   txt+=`集結先：${target}／集結時間：${rally}分\n`;

   arr.forEach((e,i)=>{
     const no=(i+1)+'①②③④⑤⑥⑦⑧⑨⑩'.charAt(0); // placeholder ignored
   });

   arr.forEach((e,i)=>{
      const rank=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'][i] || (i+1)+'.';
      const name=e.leader.padEnd(10,' ');
      txt+=`${rank}${name} ${fmt(e.depart)}\n`;
   });

   txt+='\n';
 });

 navigator.clipboard.writeText(txt);
 alert('コピーしました');
}
</script>
</body>
</html>
